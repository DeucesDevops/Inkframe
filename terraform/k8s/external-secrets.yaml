# ExternalSecret pulls RDS and Redis credentials from AWS Secrets Manager
# and creates a native Kubernetes Secret consumed by the server deployment.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: inkframe-app-secrets
  namespace: inkframe
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: inkframe-app-secrets
    creationPolicy: Owner
  data:
    # RDS – full connection URL injected directly as DATABASE_URL
    - secretKey: DATABASE_URL
      remoteRef:
        key: inkframe-production/rds/master-password  # matches aws_secretsmanager_secret.db.name
        property: url

    # Redis – full connection URL injected as REDIS_URL
    - secretKey: REDIS_URL
      remoteRef:
        key: inkframe-production/elasticache/auth-token  # matches aws_secretsmanager_secret.redis.name
        property: url
